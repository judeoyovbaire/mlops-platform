# Argo Workflows Helm Values - Azure AKS
controller:
  replicas: 1

  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 8737
    fsGroup: 8737

  # Container security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 8737
    privileged: false
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Workflow defaults
  workflowDefaults:
    spec:
      serviceAccountName: argo-workflow
      ttlStrategy:
        secondsAfterCompletion: 3600
        secondsAfterSuccess: 600
        secondsAfterFailure: 3600

  # Metrics
  metricsConfig:
    enabled: true

# Server configuration
server:
  replicas: 1

  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 8737
    fsGroup: 8737

  # Container security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 8737
    privileged: false
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false  # Server needs write access
    capabilities:
      drop:
        - ALL

  # Service account with Workload Identity
  serviceAccount:
    create: true
    name: argo-workflows-server
    annotations: {}

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # NGINX Ingress
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - argo-workflows.local

  # Extra arguments
  extraArgs:
    - --auth-mode=server

# Executor configuration
executor:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Artifact repository - MinIO
artifactRepository:
  archiveLogs: true
  s3:
    bucket: argo-artifacts
    endpoint: minio.argo.svc:9000
    # insecure: true — MinIO runs in-cluster without TLS.
    # Network policy restricts access to argo namespace only.
    # For production with sensitive data, enable MinIO TLS.
    insecure: true
    accessKeySecret:
      name: minio
      key: rootUser
    secretKeySecret:
      name: minio
      key: rootPassword

# Use Kubernetes emissary executor
useDefaultArtifactRepo: true
