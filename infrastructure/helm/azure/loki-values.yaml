# Loki Helm Values for Azure AKS - Production with Blob Storage
# Chart: grafana/loki
# Uses Azure Blob Storage with Workload Identity for authentication

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: azure
    bucketNames: "${loki_blob_container}"
    azure:
      account_name: "${storage_account_name}"
      account_key: ""  # Use Workload Identity instead
      container_name: "${loki_blob_container}"
      endpoint_suffix: "core.windows.net"
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: azure
        schema: v13
        index:
          prefix: index_
          period: 24h

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    enabled: false

# Service account for Workload Identity
serviceAccount:
  create: true
  name: loki
  annotations:
    azure.workload.identity/client-id: "${loki_workload_identity_client_id}"

# Disable components not needed in single binary mode
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

gateway:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

test:
  enabled: false
