# Prometheus Stack Helm Values - GCP GKE (prometheus-community/kube-prometheus-stack v72.6.2)
# Full observability stack: Prometheus, Grafana, AlertManager

# Grafana configuration
grafana:
  enabled: true
  adminUser: admin
  # Password from Secret Manager via External Secrets
  admin:
    existingSecret: grafana-admin-credentials
    userKey: username
    passwordKey: password

  # Service account with GKE Workload Identity
  serviceAccount:
    annotations:
      iam.gke.io/gcp-service-account: "${prometheus_service_account_email}"

  # Ingress configuration (NGINX)
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.mlops.local

  # Persistence
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: standard-rwo

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Sidecar for dashboard discovery
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
      defaultDatasourceEnabled: true

  # Additional data sources for observability stack
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring:3100
      access: proxy
      isDefault: false
    - name: Tempo
      type: tempo
      url: http://tempo.monitoring:3100
      access: proxy
      isDefault: false

# Prometheus configuration
prometheus:
  enabled: true

  prometheusSpec:
    # Service account with GKE Workload Identity
    serviceAccountName: prometheus-kube-prometheus-prometheus

    # Retention
    retention: 15d
    retentionSize: 50GB

    # Storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard-rwo
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    # Resources
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    # ServiceMonitor selector
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

    # PodMonitor selector
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}

    # Probe selector
    probeSelectorNilUsesHelmValues: false
    probeSelector: {}
    probeNamespaceSelector: {}

    # Rule selector
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}

    # Additional scrape configs for GPU metrics
    additionalScrapeConfigs: []

  # Ingress for Prometheus UI
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - prometheus.local

# AlertManager configuration
alertmanager:
  enabled: true

  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: standard-rwo
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
%{ if slack_notifications_enabled }
    # Mount Slack webhook URL from ESO-synced K8s Secret
    secrets:
      - alertmanager-slack-webhook
%{ endif }

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - alertmanager.local

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'null'
      routes:
        - match:
            alertname: Watchdog
          receiver: 'null'
        - match:
            severity: critical
          receiver: 'critical-alerts'
        - match:
            severity: warning
          receiver: 'warning-alerts'
    receivers:
      - name: 'null'
      - name: 'critical-alerts'
%{ if slack_notifications_enabled }
        slack_configs:
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url'
            channel: '${slack_channel}'
            color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
            title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }} :rotating_light:{{ end }}] {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Severity:* `{{ .Labels.severity }}`
              *Namespace:* `{{ .Labels.namespace }}`
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
            send_resolved: true
%{ endif }
        webhook_configs:
          - url: 'http://alertmanager-webhook-logger.monitoring:9095/webhook'
            send_resolved: true
      - name: 'warning-alerts'
%{ if slack_notifications_enabled }
        slack_configs:
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url'
            channel: '${slack_channel}'
            color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Severity:* `{{ .Labels.severity }}`
              *Namespace:* `{{ .Labels.namespace }}`
              *Summary:* {{ .Annotations.summary }}
              {{ end }}
            send_resolved: true
%{ endif }
        webhook_configs:
          - url: 'http://alertmanager-webhook-logger.monitoring:9095/webhook'
            send_resolved: true
    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace']

# Node Exporter
nodeExporter:
  enabled: true

# Kube State Metrics
kubeStateMetrics:
  enabled: true

# Prometheus Operator
prometheusOperator:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Default rules
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false  # Managed by GKE
    configReloaders: true
    general: true
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sContainerMemoryRss: true
    k8sContainerMemorySwap: true
    k8sContainerResource: true
    k8sPodOwner: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: false  # Managed by GKE
    kubelet: true
    kubeProxy: false  # Managed by GKE
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: false  # Managed by GKE
    kubeSchedulerRecording: false  # Managed by GKE
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

# Disable components managed by GKE
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false

# CoreDNS monitoring
coreDns:
  enabled: true

# Additional PrometheusRules for MLOps (consistent across all clouds)
additionalPrometheusRulesMap:
  mlops-alerts:
    groups:
      - name: mlops.inference
        rules:
          - alert: HighInferenceLatency
            expr: histogram_quantile(0.95, sum(rate(inference_request_duration_seconds_bucket[5m])) by (le, model_name)) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High inference latency for model {{ $labels.model_name }}"
              description: "P95 latency is {{ $value }}s (threshold: 1s)"

          - alert: HighInferenceErrorRate
            expr: sum(rate(inference_request_total{status="error"}[5m])) by (model_name) / sum(rate(inference_request_total[5m])) by (model_name) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High error rate for model {{ $labels.model_name }}"
              description: "Error rate is {{ $value | humanizePercentage }}"

          - alert: InferenceServiceDown
            expr: up{job="kserve"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Inference service {{ $labels.instance }} is down"
              description: "KServe inference service has been unreachable for 2 minutes"

      - name: mlops.mlflow
        rules:
          - alert: MLflowDown
            expr: up{job="mlflow"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "MLflow tracking server is down"
              description: "MLflow has been unreachable for 2 minutes"

          - alert: MLflowHighMemory
            expr: container_memory_usage_bytes{namespace="mlflow"} / container_spec_memory_limit_bytes{namespace="mlflow"} > 0.9
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "MLflow high memory usage"
              description: "Memory usage is above 90%"

      - name: mlops.pipelines
        rules:
          - alert: PipelineFailureRate
            expr: sum(rate(workflow_condition{status="Failed"}[1h])) / sum(rate(workflow_condition[1h])) > 0.1
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "High pipeline failure rate"
              description: "More than 10% of pipelines are failing"

          - alert: PipelineStuck
            expr: sum(kube_pod_status_phase{namespace="argo", phase="Pending"}) by (pod) > 0
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: "Pipeline pod stuck in Pending"
              description: "Pod {{ $labels.pod }} in argo namespace has been pending for 30 minutes"

      - name: mlops.gpu
        rules:
          - alert: GPUUtilizationLow
            expr: avg(DCGM_FI_DEV_GPU_UTIL) by (kubernetes_node) < 20
            for: 30m
            labels:
              severity: warning
            annotations:
              summary: "Low GPU utilization on {{ $labels.kubernetes_node }}"
              description: "GPU utilization is {{ $value }}% - consider scaling down"

          - alert: GPUMemoryHigh
            expr: DCGM_FI_DEV_FB_USED / DCGM_FI_DEV_FB_FREE > 0.95
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High GPU memory usage"
              description: "GPU memory usage is above 95%"
