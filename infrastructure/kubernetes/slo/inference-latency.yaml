# Sloth PrometheusServiceLevel for inference P99 latency SLO.
apiVersion: sloth.slok.dev/v1
kind: PrometheusServiceLevel
metadata:
  name: inference-latency
  namespace: monitoring
  labels:
    app.kubernetes.io/component: slo
spec:
  service: inference
  labels:
    team: platform
  slos:
    - name: requests-latency
      objective: 99
      description: "99% of time windows should have P99 latency < 500ms"
      sli:
        events:
          errorQuery: >
            (
              1 - (
                sum(rate(revision_request_latencies_bucket{le="500"}[{{.window}}]))
                /
                sum(rate(revision_request_latencies_bucket{le="+Inf"}[{{.window}}]))
              )
            ) * sum(rate(revision_request_latencies_count[{{.window}}]))
          totalQuery: >
            sum(rate(revision_request_latencies_count[{{.window}}]))
      alerting:
        name: InferenceLatencyBurnRate
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Inference P99 latency SLO burn rate is too high"
        pageAlert:
          labels:
            severity: critical
        ticketAlert:
          labels:
            severity: warning
