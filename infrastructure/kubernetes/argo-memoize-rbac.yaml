# RBAC for Argo Workflows memoization.
#
# Memoized steps write their cache to ConfigMaps (pipeline-cache) via the
# WORKFLOW CONTROLLER's service account, which the chart's default RBAC does
# not permit - first memoized step errored the workflow with "configmaps is
# forbidden". Scoped to the argo namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-controller-memoize
  namespace: argo
  labels:
    app.kubernetes.io/part-of: mlops-platform
rules:
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [create, get, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-controller-memoize
  namespace: argo
  labels:
    app.kubernetes.io/part-of: mlops-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-workflow-controller-memoize
subjects:
  - kind: ServiceAccount
    name: argo-workflows-workflow-controller
    namespace: argo
