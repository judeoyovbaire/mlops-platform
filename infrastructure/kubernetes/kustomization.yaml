apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - monitoring.yaml
  - network-policies.yaml
  - pod-disruption-budgets.yaml
  - resource-quotas.yaml
  - vpa.yaml
  - governance/model-registry-policies.yaml
  - governance/image-signature-policy.yaml
  - dashboards/mlops-overview-dashboard.yaml
  - dashboards/cloud-cost-dashboard.yaml
  - dashboards/progressive-delivery-dashboard.yaml
  - dashboards/gpu-dashboard.yaml
  - dashboards/ml-pipeline-dashboard.yaml
  - progressive-delivery/
  - argo-events/
  - slo/
  # gateway/ intentionally excluded: the manifests target
  # gatewayClassName: nginx, but no Gateway API controller is installed on
  # any cloud (AWS uses the ALB controller; ADR-007 skipped a mesh). The
  # directory stays as a reference until a controller decision is made.
