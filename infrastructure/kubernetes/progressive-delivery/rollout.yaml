# Argo Rollout for ML model serving with canary analysis
# Progressive traffic shifting: 10% → 25% → 50% → 100%
# Auto-rollback on metric failure via AnalysisTemplate
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ml-model-rollout
  namespace: mlops
  labels:
    app: ml-model
    component: inference
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: ml-model
  strategy:
    canary:
      canaryService: ml-model-canary
      stableService: ml-model-stable
      maxSurge: "25%"
      maxUnavailable: 0
      analysis:
        templates:
          - templateName: ml-model-canary-analysis
        startingStep: 1
        args:
          - name: service-name
            value: ml-model
          - name: canary-hash
            valueFrom:
              podTemplateHashValue: Latest
      steps:
        # Step 1: 10% traffic to canary
        - setWeight: 10
        - pause: {duration: 2m}
        # Step 2: 25% traffic to canary
        - setWeight: 25
        - pause: {duration: 2m}
        # Step 3: 50% traffic to canary
        - setWeight: 50
        - pause: {duration: 3m}
        # Step 4: Full promotion
        - setWeight: 100
      # Auto-rollback on failure
      abortScaleDownDelaySeconds: 30
  template:
    metadata:
      labels:
        app: ml-model
    spec:
      containers:
        - name: model-server
          # CI/CD pipeline replaces this tag with an image digest at deploy time
          image: ghcr.io/judeoyovbaire/mlops-platform/ml-training:v1.0.0
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5

---
# Stable service (receives production traffic)
apiVersion: v1
kind: Service
metadata:
  name: ml-model-stable
  namespace: mlops
  labels:
    app: ml-model
    role: stable
spec:
  selector:
    app: ml-model
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http

---
# Canary service (receives canary traffic)
apiVersion: v1
kind: Service
metadata:
  name: ml-model-canary
  namespace: mlops
  labels:
    app: ml-model
    role: canary
spec:
  selector:
    app: ml-model
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
