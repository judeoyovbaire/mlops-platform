# Network Policies for MLOps Platform
# Implements namespace isolation and controlled traffic flow

---
# Default deny all ingress traffic in mlops namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: mlops
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Default deny all egress traffic in mlops namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: mlops
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution to cluster DNS (kube-dns/CoreDNS in kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allows HTTPS egress to any destination — required for cloud storage
    # (S3/GCS/Blob Storage) whose IP ranges vary by region and cloud provider.
    # Network-level restriction to specific CIDRs is not portable across clouds.
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Allow MLflow access
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mlflow
      ports:
        - protocol: TCP
          port: 5000


---
# Allow ingress to inference services from kube-system (AWS ALB Controller)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-inference-ingress
  namespace: mlops
spec:
  podSelector:
    matchLabels:
      serving.kserve.io/inferenceservice: "true"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8012
        - protocol: TCP
          port: 80

---
# Allow inference services to communicate with each other (for pipelines)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-inference-internal
  namespace: mlops
spec:
  podSelector:
    matchLabels:
      serving.kserve.io/inferenceservice: "true"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mlops
      ports:
        - protocol: TCP
          port: 8080

---
# MLflow namespace policies
---
# Default deny all egress in mlflow namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: mlflow
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution to cluster DNS (kube-dns/CoreDNS in kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Default deny all ingress in mlflow namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: mlflow
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Allow MLflow access from external (NodePort for local development ONLY)
# In production, remove this policy and rely on allow-mlflow-from-mlops
# which restricts access to mlops/argo/kserve namespaces.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mlflow-external
  namespace: mlflow
spec:
  podSelector:
    matchLabels:
      app: mlflow
  policyTypes:
    - Ingress
  ingress:
    # Allow from any source (needed for NodePort access in local dev)
    - ports:
        - protocol: TCP
          port: 5000

---
# Allow MLflow access from mlops and argo namespaces (training jobs)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mlflow-from-mlops
  namespace: mlflow
spec:
  podSelector:
    matchLabels:
      app: mlflow
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mlops
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argo
      ports:
        - protocol: TCP
          port: 5000

---
# Allow MLflow access from kserve namespace (model loading)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mlflow-from-kserve
  namespace: mlflow
spec:
  podSelector:
    matchLabels:
      app: mlflow
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kserve
      ports:
        - protocol: TCP
          port: 5000

---
# Allow MLflow to connect to PostgreSQL (egress)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mlflow-db-egress
  namespace: mlflow
spec:
  podSelector:
    matchLabels:
      app: mlflow
  policyTypes:
    - Egress
  egress:
    # PostgreSQL (external RDS/Cloud SQL - allow any destination on 5432)
    - to: []
      ports:
        - protocol: TCP
          port: 5432
    # S3 (HTTPS)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # DNS - restrict to cluster DNS (kube-dns/CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

