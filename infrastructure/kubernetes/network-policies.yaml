---
# Allow Argo Workflows components to communicate internally
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argo-internal
  namespace: argo
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argo

---
# Allow Argo Workflows to access MLflow for experiment tracking
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argo-mlflow-egress
  namespace: argo
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # MLflow
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mlflow
      ports:
        - protocol: TCP
          port: 5000
    # KServe for model deployment
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kserve
    # MinIO (internal)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argo
      ports:
        - protocol: TCP
          port: 9000
    # DNS - restrict to cluster DNS (kube-dns/CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS (for external data sources)
    - to: []
      ports:
        - protocol: TCP
          port: 443

---
# KServe namespace policies
---
# KServe controller network policy
# Restricts traffic to only necessary ports and sources:
# - Webhook server (9443): Receives admission requests from API server
# - Metrics (8443): Prometheus scraping
# - Health checks (8081): Readiness/liveness probes
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kserve-controller
  namespace: kserve
spec:
  podSelector:
    matchLabels:
      control-plane: kserve-controller-manager
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Webhook calls from API server (proxied through kube-system)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 9443
    # Metrics and health checks from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8443
        - protocol: TCP
          port: 8081
  egress:
    # Kubernetes API
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # DNS - restrict to cluster DNS (kube-dns/CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Access to mlops namespace for managing inference services
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mlops

---
# Allow KServe internal communication (controller-to-webhook)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kserve-internal
  namespace: kserve
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Allow all traffic within kserve namespace (controller <-> webhook)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kserve

---
# Monitoring namespace policies
---
# Default deny all ingress in monitoring namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Default deny all egress in monitoring namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Egress

---
# Allow monitoring namespace egress for required communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-egress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Internal monitoring communication
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
    # Prometheus scrapes targets in ML namespaces
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mlops
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mlflow
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argo
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kserve
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
    # HTTPS egress for cloud APIs (remote write, alerts, etc.)
    - ports:
        - protocol: TCP
          port: 443

---
# Allow Prometheus scraping from all namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argo
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mlops
      ports:
        - protocol: TCP
          port: 9090

---
# Allow Grafana access from ingress controller and all namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-ingress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 3000

---
# Allow Alertmanager access from monitoring namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alertmanager
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
