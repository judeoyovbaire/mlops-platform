apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-pipeline-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "MLOps"
data:
  ml-pipeline.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null}
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 8, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "auto",
            "wideLayout": true,
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            }
          },
          "title": "Active Workflows",
          "type": "stat",
          "targets": [
            {
              "expr": "count(argo_workflows_count{status=\"Running\"})",
              "legendFormat": "Running",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisLabel": "",
                "barAlignment": 0,
                "drawStyle": "bars",
                "fillOpacity": 80,
                "lineWidth": 1,
                "stacking": {"mode": "normal"}
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null}
                ]
              }
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Failed"},
                "properties": [{"id": "color", "value": {"fixedColor": "red", "mode": "fixed"}}]
              },
              {
                "matcher": {"id": "byName", "options": "Succeeded"},
                "properties": [{"id": "color", "value": {"fixedColor": "green", "mode": "fixed"}}]
              },
              {
                "matcher": {"id": "byName", "options": "Error"},
                "properties": [{"id": "color", "value": {"fixedColor": "orange", "mode": "fixed"}}]
              }
            ]
          },
          "gridPos": {"h": 8, "w": 16, "x": 8, "y": 0},
          "id": 2,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "title": "Pipeline Executions by Status",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(increase(argo_workflows_count{status=\"Succeeded\"}[$__rate_interval]))",
              "legendFormat": "Succeeded",
              "refId": "A"
            },
            {
              "expr": "sum(increase(argo_workflows_count{status=\"Failed\"}[$__rate_interval]))",
              "legendFormat": "Failed",
              "refId": "B"
            },
            {
              "expr": "sum(increase(argo_workflows_count{status=\"Error\"}[$__rate_interval]))",
              "legendFormat": "Error",
              "refId": "C"
            }
          ]
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisLabel": "Duration (s)",
                "drawStyle": "bars",
                "fillOpacity": 60,
                "lineWidth": 1
              },
              "unit": "s",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 300},
                  {"color": "red", "value": 600}
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "title": "Pipeline Step Duration",
          "type": "timeseries",
          "targets": [
            {
              "expr": "argo_workflows_pods_duration{template=\"load-data\"}",
              "legendFormat": "load-data",
              "refId": "A"
            },
            {
              "expr": "argo_workflows_pods_duration{template=\"validate-data\"}",
              "legendFormat": "validate-data",
              "refId": "B"
            },
            {
              "expr": "argo_workflows_pods_duration{template=\"feature-engineering\"}",
              "legendFormat": "feature-engineering",
              "refId": "C"
            },
            {
              "expr": "argo_workflows_pods_duration{template=\"train-model\"}",
              "legendFormat": "train-model",
              "refId": "D"
            },
            {
              "expr": "argo_workflows_pods_duration{template=\"register-model\"}",
              "legendFormat": "register-model",
              "refId": "E"
            }
          ]
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisLabel": "Accuracy",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "always"
              },
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 0.8},
                  {"color": "green", "value": 0.9}
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "single"}
          },
          "title": "Model Accuracy Trend",
          "type": "timeseries",
          "targets": [
            {
              "expr": "argo_workflows_result_metrics{metric_name=\"accuracy\"}",
              "legendFormat": "accuracy",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 1
              },
              "unit": "short",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null}
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "id": 5,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "title": "Pipeline Pod CPU Usage",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"argo\", pod=~\"ml-training.*\"}[$__rate_interval])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 1
              },
              "unit": "bytes",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null}
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "id": 6,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "title": "Pipeline Pod Memory Usage",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"argo\", pod=~\"ml-training.*\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["mlops", "pipeline", "training"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "ML Pipeline Execution",
      "uid": "ml-pipeline-execution",
      "version": 1
    }
