# Build, sign, and publish container images to GHCR with Cosign keyless signing
# Uses Sigstore keyless signing via GitHub OIDC for zero-secret supply chain security

name: Build, Sign & Publish

on:
  push:
    branches: [main]
    paths:
      - "pipelines/**"
      - "components/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  TRAINING_IMAGE: ghcr.io/${{ github.repository }}/ml-training
  PRETRAINED_IMAGE: ghcr.io/${{ github.repository }}/hf-pretrained

permissions:
  contents: read
  packages: write
  id-token: write  # Required for Sigstore keyless signing via OIDC
  attestations: write

jobs:
  build-sign-publish:
    name: Build & Sign Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - image_name: ml-training
            dockerfile: ./pipelines/training/Dockerfile
            context: ./pipelines
          - image_name: hf-pretrained
            dockerfile: ./pipelines/pretrained/Dockerfile
            context: ./pipelines
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image_name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image_name }}@${{ steps.build.outputs.digest }}
          format: "spdx-json"
          output: "sbom-${{ matrix.image_name }}.spdx.json"
          exit-code: "0"

      - name: Attach SBOM to image with Cosign
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attach sbom \
            --sbom sbom-${{ matrix.image_name }}.spdx.json \
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image_name }}@${DIGEST}

      - name: Attest SBOM with Cosign
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.image_name }}.spdx.json \
            --type spdxjson \
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image_name }}@${DIGEST}

  verify-signatures:
    name: Verify Signatures
    runs-on: ubuntu-latest
    needs: [build-sign-publish]
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify training image signature
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY }}/${{ github.repository }}/ml-training:latest

      - name: Verify pretrained image signature
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY }}/${{ github.repository }}/hf-pretrained:latest
