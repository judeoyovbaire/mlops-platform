# Infracost - Infrastructure cost estimation on PRs
# Posts cost delta as a PR comment when Terraform files change

name: Infracost

on:
  pull_request:
    branches: [main]
    paths:
      - "infrastructure/terraform/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  infracost:
    name: Infrastructure Cost Estimate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        cloud:
          - name: aws
            path: infrastructure/terraform/environments/aws/dev
          - name: azure
            path: infrastructure/terraform/environments/azure/dev
          - name: gcp
            path: infrastructure/terraform/environments/gcp/dev
    steps:
      - name: Checkout base branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Setup Infracost
        uses: infracost/actions/setup@e9d6e6cd65e168e76b0de50ff9957d2fe8bb1832 # v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
          currency: USD

      - name: Generate Infracost baseline
        run: |
          infracost breakdown \
            --path=${{ matrix.cloud.path }} \
            --format=json \
            --out-file=/tmp/infracost-base-${{ matrix.cloud.name }}.json
        continue-on-error: true

      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate Infracost diff
        run: |
          infracost diff \
            --path=${{ matrix.cloud.path }} \
            --compare-to=/tmp/infracost-base-${{ matrix.cloud.name }}.json \
            --format=json \
            --out-file=/tmp/infracost-diff-${{ matrix.cloud.name }}.json
        continue-on-error: true

      - name: Upload Infracost diff
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: infracost-diff-${{ matrix.cloud.name }}
          path: /tmp/infracost-diff-${{ matrix.cloud.name }}.json

  comment:
    name: Post Cost Comment
    runs-on: ubuntu-latest
    needs: [infracost]
    steps:
      - name: Setup Infracost
        uses: infracost/actions/setup@e9d6e6cd65e168e76b0de50ff9957d2fe8bb1832 # v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Download all diffs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: /tmp/infracost-diffs/

      - name: Post PR comment
        run: |
          # Combine all cloud diffs into a single comment
          infracost output \
            --path="/tmp/infracost-diffs/**/*.json" \
            --format=github-comment \
            --out-file=/tmp/infracost-comment.md \
            --show-all-projects
        continue-on-error: true

      - name: Comment on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        if: always()
        with:
          script: |
            const fs = require('fs');
            let body = '## Infrastructure Cost Estimate\n\n';
            try {
              body = fs.readFileSync('/tmp/infracost-comment.md', 'utf8');
            } catch (e) {
              body += '_Infracost analysis could not be generated. Ensure `INFRACOST_API_KEY` secret is configured._\n';
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c =>
              c.body.includes('Infrastructure Cost Estimate') && c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
