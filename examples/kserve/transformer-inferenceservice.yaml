# InferenceService with Transformer + Predictor pattern.
# The transformer applies preprocessing (feature scaling, encoding) before
# forwarding to the sklearn predictor, decoupling preprocessing from the model.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: sklearn-iris-with-transformer
  namespace: mlops
  labels:
    mlops.io/model-name: iris-classifier
    mlops.io/model-version: "1.0.0"
    mlops.io/model-owner: platform-team
    mlops.io/model-stage: staging
  annotations:
    mlops.io/mlflow-experiment-id: "1"
    mlops.io/mlflow-run-id: "placeholder"
spec:
  transformer:
    containers:
      - name: transformer
        # Tag "main" tracks the latest signed image from build-sign-publish;
        # the CI deploy path will substitute an immutable digest once the
        # registry-to-serving deploy wiring lands.
        image: ghcr.io/judeoyovbaire/mlops-platform/kserve-transformer:main
        env:
          - name: PREPROCESSOR_PATH
            value: /mnt/models/preprocessor.joblib
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
  predictor:
    model:
      modelFormat:
        name: sklearn
      storageUri: gs://mlops-models/iris-classifier/v1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1
          memory: 1Gi
