# KServe InferenceService Examples
# These use public pre-trained models to validate KServe functionality

# Basic sklearn model deployment with production-ready configuration
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: sklearn-iris
  namespace: mlops
  labels:
    app.kubernetes.io/name: sklearn-iris
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/managed-by: kserve
    # Required by governance/model-registry-policies.yaml (Kyverno Enforce)
    mlops.io/model-name: sklearn-iris-demo
    mlops.io/model-version: "1.0.0"
    mlops.io/model-owner: platform-team
    mlops.io/model-stage: staging
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/auth-url: "https://$host/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://$host/oauth2/start?rd=$escaped_request_uri"
spec:
  predictor:
    serviceAccountName: kserve-inference
    minReplicas: 1
    maxReplicas: 3
    containerConcurrency: 10
    model:
      modelFormat:
        name: sklearn
      storageUri: gs://kfserving-examples/models/sklearn/1.0/model
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    # Pod anti-affinity for high availability
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: sklearn-iris
              topologyKey: kubernetes.io/hostname
---
# Ingress for external access via AWS ALB
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sklearn-iris-ingress
  namespace: mlops
  labels:
    app.kubernetes.io/name: sklearn-iris
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: mlops-platform
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /v1/models/sklearn-iris
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sklearn-iris-predictor
                port:
                  number: 80
---
# ServiceAccount for KServe inference workloads
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kserve-inference
  namespace: mlops
  labels:
    app.kubernetes.io/name: kserve-inference
    app.kubernetes.io/component: serviceaccount
    app.kubernetes.io/part-of: mlops-platform
---
# PodDisruptionBudget for sklearn-iris
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sklearn-iris-pdb
  namespace: mlops
  labels:
    app.kubernetes.io/name: sklearn-iris
    app.kubernetes.io/component: pdb
    app.kubernetes.io/part-of: mlops-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      serving.kserve.io/inferenceservice: sklearn-iris