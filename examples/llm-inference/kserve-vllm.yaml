# vLLM on KServe RawDeployment - the JDH-376 benchmark pair (A10G/g5).
#
# Two configurations of the same ungated Apache-2.0 model, sized for one
# g5.xlarge (A10G 24GB) each, so bf16-vs-AWQ can be measured side by side:
#   llm-qwen-bf16 - Qwen2.5-7B-Instruct, bfloat16 (the baseline)
#   llm-qwen-awq  - Qwen2.5-7B-Instruct-AWQ (4-bit, the production default)
#
# Fixes to the never-launched original:
# - nodeSelector matches the Karpenter GPU pool's ACTUAL label
#   (node-type: gpu; the old role: gpu matched nothing)
# - no Knative autoscaling annotations - meaningless in RawDeployment
# - no VLLM_ATTENTION_BACKEND forcing - vLLM auto-selects; forcing
#   FLASH_ATTN was the T4 abort in the original
# - model revisions PINNED to Hub commit SHAs (immutable refs for models -
#   the JDH-397 principle; vLLM --revision)
# - /dev/shm sized for vLLM; HF cache on emptyDir backed by the node's
#   100Gi gp3; ungated models, no HF token needed
#
# Prerequisites:
# - spot-G quota >= 4 vCPUs (JDH-375; 8 to run both at once)
# - nvidia-device-plugin (installed by the platform - aws-platform/gpu.tf)
#
# Usage: kubectl apply -f kserve-vllm.yaml (node ~2 min, model pull + load
# ~5-8 min). Benchmark: scripts/benchmark/llm_bench.py (see README).
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: llm-qwen-bf16
  namespace: mlops
  labels:
    app.kubernetes.io/part-of: mlops-platform
    mlops.io/model-name: llm-qwen-bf16
    mlops.io/model-version: "1"
    mlops.io/model-owner: platform-team
    mlops.io/model-stage: staging
  annotations:
    mlops.io/mlflow-run-id: "external-pretrained"
    mlops.io/mlflow-experiment-id: "external-pretrained"
    mlops.io/hf-revision: "a09a35458c702b33eeacc393d103063234e8bc28"
spec:
  predictor:
    timeout: 1800
    containers:
      - name: kserve-container
        image: vllm/vllm-openai:v0.11.0
        args:
          - --model=Qwen/Qwen2.5-7B-Instruct
          - --revision=a09a35458c702b33eeacc393d103063234e8bc28
          - --dtype=bfloat16
          - --max-model-len=8192
          - --gpu-memory-utilization=0.90
          - --port=8080
          - --served-model-name=qwen25-7b
        ports:
          - containerPort: 8080
            protocol: TCP
        resources:
          requests:
            cpu: "3"
            memory: 12Gi
            nvidia.com/gpu: "1"
          limits:
            # Explicit cpu limit: without it the mlops LimitRange injects
            # its default (1), making requests(3) > limits and the
            # Deployment invalid. g5.xlarge has 4 vCPUs.
            cpu: "4"
            memory: 14Gi
            nvidia.com/gpu: "1"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
          - name: shm
            mountPath: /dev/shm
          - name: hf-cache
            mountPath: /root/.cache/huggingface
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 300
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
    volumes:
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      - name: hf-cache
        emptyDir:
          sizeLimit: 40Gi
    nodeSelector:
      node-type: gpu
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: llm-qwen-awq
  namespace: mlops
  labels:
    app.kubernetes.io/part-of: mlops-platform
    mlops.io/model-name: llm-qwen-awq
    mlops.io/model-version: "1"
    mlops.io/model-owner: platform-team
    mlops.io/model-stage: staging
  annotations:
    mlops.io/mlflow-run-id: "external-pretrained"
    mlops.io/mlflow-experiment-id: "external-pretrained"
    mlops.io/hf-revision: "b25037543e9394b818fdfca67ab2a00ecc7dd641"
spec:
  predictor:
    timeout: 1800
    containers:
      - name: kserve-container
        image: vllm/vllm-openai:v0.11.0
        args:
          - --model=Qwen/Qwen2.5-7B-Instruct-AWQ
          - --revision=b25037543e9394b818fdfca67ab2a00ecc7dd641
          - --quantization=awq
          - --dtype=float16
          - --max-model-len=8192
          - --gpu-memory-utilization=0.90
          - --port=8080
          - --served-model-name=qwen25-7b-awq
        ports:
          - containerPort: 8080
            protocol: TCP
        resources:
          requests:
            cpu: "3"
            memory: 12Gi
            nvidia.com/gpu: "1"
          limits:
            # Explicit cpu limit: without it the mlops LimitRange injects
            # its default (1), making requests(3) > limits and the
            # Deployment invalid. g5.xlarge has 4 vCPUs.
            cpu: "4"
            memory: 14Gi
            nvidia.com/gpu: "1"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
          - name: shm
            mountPath: /dev/shm
          - name: hf-cache
            mountPath: /root/.cache/huggingface
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 300
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
    volumes:
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      - name: hf-cache
        emptyDir:
          sizeLimit: 40Gi
    nodeSelector:
      node-type: gpu
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
